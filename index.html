<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Size Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1e3c72; min-height: 100vh; padding: 16px; color: #333; }
.container { max-width: 520px; margin: 0 auto; background: #fff; border-radius: 16px; overflow: hidden; }
.header { background: #f5a623; padding: 18px; text-align: center; color: #fff; }
.header h1 { font-size: 22px; }
.form { padding: 18px; }
.field { margin-bottom: 14px; }
label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: #666; margin-bottom: 6px; }
input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; background: #fff; }
.toggle-group { display: flex; gap: 6px; margin-bottom: 6px; }
.toggle-btn { flex: 1; padding: 10px; border: 2px solid #ddd; background: #fafafa; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; }
.toggle-btn.active { background: #2a5298; color: #fff; border-color: #2a5298; }
.results { background: #f0f4f8; padding: 18px; border-top: 3px solid #2a5298; }
.lot-display { text-align: center; background: #fff; padding: 16px; border-radius: 12px; border: 3px solid #2a5298; margin-bottom: 12px; }
.lot-display .label { font-size: 12px; color: #666; text-transform: uppercase; }
.lot-display .value { font-size: 38px; font-weight: 800; color: #2a5298; }
.lot-display .sub { font-size: 13px; color: #666; }
.row { display: flex; justify-content: space-between; padding: 10px 14px; background: #fff; border-radius: 8px; margin-bottom: 6px; font-size: 14px; }
.row.green { background: #e8f5e9; color: #2e7d32; }
.row.red { background: #ffebee; color: #c62828; }
.row .v { font-weight: 700; }
.err { color: #d9534f; font-size: 13px; text-align: center; padding: 8px; }
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>Lot Size Calculator</h1></div>
<div class="form">
<div class="field"><label>Account Balance</label><input type="number" inputmode="decimal" id="balance" value="10000"></div>
<div class="field"><label>Instrument</label>
<select id="instrument">
<option value="gold">Gold (XAU/USD)</option>
<option value="silver">Silver (XAG/USD)</option>
<option value="eurusd">EUR/USD</option>
<option value="gbpusd">GBP/USD</option>
<option value="usdjpy">USD/JPY</option>
<option value="audusd">AUD/USD</option>
<option value="us30">US30</option>
<option value="nas100">NAS100</option>
<option value="spx500">SPX500</option>
<option value="oil">Crude Oil</option>
<option value="btc">Bitcoin</option>
</select>
</div>
<div class="field"><label>Risk</label>
<div class="toggle-group">
<button type="button" class="toggle-btn active" data-g="risk" data-v="percent">Percent</button>
<button type="button" class="toggle-btn" data-g="risk" data-v="dollar">Dollar</button>
</div>
<input type="number" inputmode="decimal" id="risk" value="1">
</div>
<div class="field"><label>Stop Loss</label>
<div class="toggle-group">
<button type="button" class="toggle-btn active" data-g="sl" data-v="pips">Pips</button>
<button type="button" class="toggle-btn" data-g="sl" data-v="points">Points</button>
</div>
<input type="number" inputmode="decimal" id="sl" value="50">
</div>
<div class="field"><label>Take Profit</label>
<div class="toggle-group">
<button type="button" class="toggle-btn active" data-g="tp" data-v="ratio">R:R Ratio</button>
<button type="button" class="toggle-btn" data-g="tp" data-v="distance">TP Distance</button>
</div>
<input type="number" inputmode="decimal" id="tp" value="2">
</div>
</div>
<div class="results">
<div class="lot-display"><div class="label">Lot Size</div><div class="value" id="lot">0.00</div><div class="sub">standard lots</div></div>
<div class="row red"><span>Risk Amount</span><span class="v" id="riskAmt">$0</span></div>
<div class="row green"><span>Potential Reward</span><span class="v" id="rewardAmt">$0</span></div>
<div class="row"><span>Risk : Reward</span><span class="v" id="rr">1 : 2</span></div>
<div class="row"><span>TP Distance</span><span class="v" id="tpDist">0</span></div>
<div class="row"><span>Mini Lots</span><span class="v" id="mini">0</span></div>
<div class="row"><span>Micro Lots</span><span class="v" id="micro">0</span></div>
<div class="err" id="err"></div>
</div>
</div>
<script>
var pipValues = { gold:10, silver:5, eurusd:10, gbpusd:10, usdjpy:9.09, audusd:10, us30:1, nas100:1, spx500:1, oil:10, btc:1 };
var pointValues = { gold:100, silver:50, eurusd:1, gbpusd:1, usdjpy:0.909, audusd:1, us30:1, nas100:1, spx500:1, oil:100, btc:1 };
var riskMode = "percent", slMode = "pips", tpMode = "ratio";

function fmt(n, d) {
  if (!isFinite(n) || isNaN(n)) return "0";
  return Number(n).toFixed(d);
}

function calc() {
  try {
    var errEl = document.getElementById("err");
    errEl.textContent = "";
    var balance = parseFloat(document.getElementById("balance").value);
    var riskIn = parseFloat(document.getElementById("risk").value);
    var sl = parseFloat(document.getElementById("sl").value);
    var tpIn = parseFloat(document.getElementById("tp").value);
    var instKey = document.getElementById("instrument").value;
    var pip = pipValues[instKey];
    var pt = pointValues[instKey];

    if (!(balance > 0) || !(riskIn > 0) || !(sl > 0) || !(tpIn > 0)) {
      errEl.textContent = "Enter valid positive numbers.";
      return;
    }

    var ppv = (slMode === "pips") ? pip : pt;
    var riskDollar = (riskMode === "percent") ? balance * (riskIn / 100) : riskIn;
    var lot = riskDollar / (sl * ppv);

    var rr, tpDist, rewardDollar;
    if (tpMode === "ratio") {
      rr = tpIn; tpDist = sl * rr; rewardDollar = riskDollar * rr;
    } else {
      tpDist = tpIn; rr = tpDist / sl; rewardDollar = lot * tpDist * ppv;
    }

    document.getElementById("lot").textContent = fmt(lot, 2);
    document.getElementById("riskAmt").textContent = "$" + fmt(riskDollar, 2);
    document.getElementById("rewardAmt").textContent = "$" + fmt(rewardDollar, 2);
    document.getElementById("rr").textContent = "1 : " + fmt(rr, 2);
    document.getElementById("tpDist").textContent = fmt(tpDist, 1) + " " + slMode;
    document.getElementById("mini").textContent = fmt(lot * 10, 1);
    document.getElementById("micro").textContent = fmt(lot * 100, 0);
  } catch (e) {
    document.getElementById("err").textContent = "Error: " + e.message;
  }
}

var inputs = document.querySelectorAll("input, select");
for (var i = 0; i < inputs.length; i++) {
  inputs[i].addEventListener("input", calc);
  inputs[i].addEventListener("change", calc);
  inputs[i].addEventListener("keyup", calc);
  inputs[i].addEventListener("blur", calc);
}

var btns = document.querySelectorAll(".toggle-btn");
for (var j = 0; j < btns.length; j++) {
  btns[j].addEventListener("click", function() {
    var g = this.getAttribute("data-g");
    var v = this.getAttribute("data-v");
    var group = document.querySelectorAll("[data-g='" + g + "']");
    for (var k = 0; k < group.length; k++) group[k].classList.remove("active");
    this.classList.add("active");
    if (g === "risk") riskMode = v;
    if (g === "sl") slMode = v;
    if (g === "tp") tpMode = v;
    calc();
  });
}

calc();
</script>
</body>
</html>
